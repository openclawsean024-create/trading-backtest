<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Candlestick 1 (green, bullish) -->
  <rect x="5" y="18" width="4" height="8" rx="1" fill="#22c55e"/>
  <line x1="7" y1="14" x2="7" y2="18" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="7" y1="26" x2="7" y2="30" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Candlestick 2 (red, bearish) -->
  <rect x="12" y="12" width="4" height="10" rx="1" fill="#ef4444"/>
  <line x1="14" y1="6" x2="14" y2="12" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="14" y1="22" x2="14" y2="28" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Candlestick 3 (green, bullish) -->
  <rect x="19" y="8" width="4" height="14" rx="1" fill="#22c55e"/>
  <line x1="21" y1="4" x2="21" y2="8" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="21" y1="22" x2="21" y2="26" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Candlestick 4 (green, small) -->
  <rect x="26" y="16" width="3" height="6" rx="1" fill="#22c55e"/>
  <line x1="27.5" y1="13" x2="27.5" y2="16" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="27.5" y1="22" x2="27.5" y2="24" stroke="#22c55e" stroke-width="1.5"/>
</svg>
